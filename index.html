<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>One Way Ticket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="color.css?v=3">
    <meta name="apple-mobile-web-app-status-bar-style" content="#5CAD5C">
    <meta name="theme-color" content="#5CAD5C" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="NJ Transit">
    <link rel="apple-touch-icon" href="icon.png">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
</head>

<body>

    <!-- Blue header background -->
    <div class="curved-background"
     id="curved-background">
    </div>

    <!-- Title -->
    <div class="header">One Way Ticket</div>

    <!-- Card -->
    <div class="card">

        <!-- Top content -->
        <div class="card-top">
            <div class="qr" id="qr-frame">
                <img class="qr-code" src="your-qr-code-image.png" id="QRCODE" alt="QR Code">
            </div>
            <div class="tap">Tap to enlarge</div>
            <hr class="divider">
            <div class="interstate" onclick="updateStateText()">INTERSTATE</div>
            <div class="details-row">
                <div class="month" id="pass_month_year">NOV<br>2025</div>
                <div class="zone">
                    <div class="number" onclick="updateZoneText()">2</div>
                    <div class="text">ZONE RIDE</div>
                    <div class="adult" onclick="updateAdultText()">1 Adult</div>
                </div>
            </div>
        </div>

        <!-- Progress bottom -->
        <div class="progress">
            <div class="color-strip">
                <div class="color-block red"></div>
                <div class="color-block green"></div>
                <div class="color-block blue"></div>
            </div>
            <div class="progress-bar" id="progress-bar"></div>
            <!-- <div class="expiry">Expires in <span id="countdown">60:00</span></div> -->
            <div class="expiry"><span class="expires-text">Expires in </span><span id="countdown">60:00</span></div>
            <div class="validator">View Onboard Validator Instructions</div>
        </div>

    </div>

    <script>
        function updateMonthAndYear() {
            var currentDate = new Date();
            var monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            var month = monthNames[currentDate.getMonth()];
            var year = currentDate.getFullYear();
            document.getElementById("pass_month_year").innerHTML = month + "<br>" + year;
        }

        function updateZoneText() {
            const zoneElement = document.querySelector('.number');
            let currentZone = parseInt(zoneElement.textContent, 10);
            currentZone = currentZone === 9 ? 2 : currentZone + 1;
            zoneElement.textContent = currentZone;
        }

        const duration = 60 * 60 * 1000;

        localStorage.setItem('ticketStart', Date.now().toString());
        const startTime = parseInt(localStorage.getItem('ticketStart'));

        function updateCountdown() {
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(duration - elapsed, 0);

            if (remaining === 0) {
                document.getElementById('countdown').textContent = 'EXPIRED';
                document.querySelector('.expiry').style.color = 'red';
                document.querySelector('.progress-bar').style.setProperty('--progress-width', '0%');
                return;
            }

            const totalMinutes = Math.floor(remaining / (1000 * 60));
            const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
            const mm = String(totalMinutes).padStart(2, '0');
            const ss = String(seconds).padStart(2, '0');

            document.getElementById('countdown').textContent = `${mm}:${ss}`;

            const progressPercent = ((duration - remaining) / duration) * 100 + 1;
            document.querySelector('.progress-bar').style.setProperty('--progress-width', `${progressPercent}%`);
        }
        function updateAdultText() {
            const adultElement = document.querySelector('.adult');
            // Extract current number from text like "1 Adult" or "3 Adults"
            let current = parseInt(adultElement.textContent, 10);
            // Cycle 1 → 2 → 3 → 4 → 5 → 1
            current = current === 5 ? 1 : current + 1;
            // Use singular "Adult" for 1, plural "Adults" otherwise
            adultElement.textContent = `${current} ${current === 1 ? 'Adult' : 'Adults'}`;
        }
        function updateStateText() {
            const el = document.querySelector('.interstate');
            const isInterstate = el.dataset.mode !== 'intra';
            el.dataset.mode = isInterstate ? 'intra' : 'inter';
            el.textContent = isInterstate ? 'INTRASTATE' : 'INTERSTATE';
            el.classList.toggle('intrastate', isInterstate);
        }

        const root = document.documentElement;

        const PALETTE = ['#5CAD5C', '#B61D8D', '#0066FF', '#1D86D7', '#FF5C5C', '#C284C2', '#FFCCD5', '#FFD700', '#999999'];

        let headerColorIndex = parseInt(localStorage.getItem("headerColorIndex")) || 0;
        let qrColorIndex = parseInt(localStorage.getItem("qrColorIndex")) || 0;

        function applyHeaderColor() {
            const color = PALETTE[headerColorIndex];
            root.style.setProperty('--header', color);
            document.querySelector('meta[name="theme-color"]').setAttribute('content', color);
        }

        function applyQrColor() {
            root.style.setProperty('--qr', PALETTE[qrColorIndex]);
        }

        function cycleHeaderColor() {
            headerColorIndex = (headerColorIndex + 1) % PALETTE.length;
            localStorage.setItem("headerColorIndex", headerColorIndex);
            applyHeaderColor();
        }

        function cycleQrColor() {
            qrColorIndex = (qrColorIndex + 1) % PALETTE.length;
            localStorage.setItem("qrColorIndex", qrColorIndex);
            applyQrColor();
        }

        document.getElementById('curved-background').addEventListener('pointerdown', cycleHeaderColor);
        document.getElementById('qr-frame').addEventListener('pointerdown', cycleQrColor);

        function setValidatorState(isZoomed) {
            const el = document.querySelector('.validator');
            el.classList.add('swap-fade');
            setTimeout(() => {
                el.textContent = isZoomed ? '‹ Back to ticket' : 'View Onboard Validator Instructions';
                el.classList.toggle('back-button', isZoomed);
                el.classList.remove('swap-fade');
            }, 150);
        }

        function openQrZoom() {
            if (document.body.classList.contains('qr-zoomed')) return;
            document.body.classList.add('qr-zoomed');
            setValidatorState(true);
        }

        function closeQrZoom() {
            if (!document.body.classList.contains('qr-zoomed')) return;
            document.body.classList.remove('qr-zoomed');
            setValidatorState(false);
        }

        // Tapping the QR code itself toggles the zoom; tapping the colored
        // frame around it still cycles the frame color (see qr-frame listener above).
        document.getElementById('QRCODE').addEventListener('pointerdown', function (e) {
            e.stopPropagation();
            if (document.body.classList.contains('qr-zoomed')) {
                closeQrZoom();
            } else {
                openQrZoom();
            }
        });

        document.querySelector('.validator').addEventListener('click', function () {
            if (document.body.classList.contains('qr-zoomed')) {
                closeQrZoom();
            }
        });

        applyHeaderColor();
        applyQrColor();

        updateCountdown();
        setInterval(updateCountdown, 1000);
        updateMonthAndYear();
    </script>

</body>

</html>
